name: OMIE Monitor

on:

  # Execução automática diária
  schedule:

    # GitHub Actions usa UTC
    # 12:10 Europe/Lisbon no horário de inverno = 12:10 UTC
    # Nota:
    # Durante horário de verão Portugal muda para UTC+1.
    # Será ajustado posteriormente se necessário.
    - cron: "10 12 * * *"


  # Permite executar manualmente
  workflow_dispatch:



jobs:

  monitor:


    name: Run OMIE Monitor


    runs-on: ubuntu-latest



    permissions:

      contents: write



    steps:



      #
      # Checkout do código
      #

      - name: Checkout repository

        uses: actions/checkout@v4



      #
      # Python
      #

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"



      #
      # Dependências
      #

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt



      #
      # Executar monitor
      #

      - name: Run OMIE Monitor

        run: |

          python monitor.py



      #
      # Guardar histórico
      #

      - name: Commit history update


        run: |


          git config \
          --global user.name \
          "github-actions[bot]"


          git config \
          --global user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"



          git add history.csv



          git diff \
          --quiet && \
          exit 0



          git commit \
          -m "Update OMIE history"



          git push
